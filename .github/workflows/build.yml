name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j4

      - name: Zip artifacts
        run: |
          Compress-Archive -Path build/SpaceEcho_artefacts/Release/VST3/* -DestinationPath ObstacleSpaceEcho-Windows-VST3.zip
          Compress-Archive -Path build/SpaceEcho_artefacts/Release/Standalone/* -DestinationPath ObstacleSpaceEcho-Windows-Standalone.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ObstacleSpaceEcho-Windows
          path: |
            ObstacleSpaceEcho-Windows-VST3.zip
            ObstacleSpaceEcho-Windows-Standalone.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j4

      - name: Zip artifacts
        run: |
          zip -r ObstacleSpaceEcho-macOS-VST3.zip   build/SpaceEcho_artefacts/Release/VST3/
          zip -r ObstacleSpaceEcho-macOS-AU.zip     build/SpaceEcho_artefacts/Release/AU/
          zip -r ObstacleSpaceEcho-macOS-Standalone.zip build/SpaceEcho_artefacts/Release/Standalone/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ObstacleSpaceEcho-macOS
          path: |
            ObstacleSpaceEcho-macOS-VST3.zip
            ObstacleSpaceEcho-macOS-AU.zip
            ObstacleSpaceEcho-macOS-Standalone.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: ObstacleSpaceEcho-Windows
          path: dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ObstacleSpaceEcho-macOS
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
